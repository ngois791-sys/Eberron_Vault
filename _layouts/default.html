<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow"><!-- unlisted: ask search engines not to index -->
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark">&#9670;</span>
        <span class="brand-text">{{ site.title }}</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.body.classList.toggle('nav-open')">&#9776;</button>
      <nav class="site-nav">
        <a href="{{ '/lore/'       | relative_url }}">Lore</a>
        <a href="{{ '/sessions/'   | relative_url }}">Sessions</a>
        <a href="{{ '/npcs/'       | relative_url }}">NPCs</a>
        <a href="{{ '/characters/' | relative_url }}">Party</a>
        <a href="{{ '/events/'     | relative_url }}">Timeline</a>
        <a href="{{ '/maps/'       | relative_url }}">Maps</a>
      </nav>
    </div>
  </header>

  <main class="wrap site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>{{ site.title }} &mdash; {{ site.tagline }}</p>
      <p class="muted">Compiled by the Keeper of the Vault. For the eyes of our table.</p>
    </div>
  </footer>
</body>
</html>
