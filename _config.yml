# ===========================================================================
#  SITE CONFIGURATION
#  Edit the values below to change your campaign's name, tagline, etc.
# ===========================================================================

title: "The Eberron Vault"
tagline: "A Campaign Companion"
description: >-
  A living archive for our Eberron campaign — lore, session recaps,
  the people we've met, and the maps we've walked.

# ---------------------------------------------------------------------------
#  IMPORTANT — baseurl
#  GitHub Pages serves a project site at:  https://USERNAME.github.io/REPO/
#  If that's your setup, set baseurl to "/REPO" (the repo name, with a slash).
#  Example:  baseurl: "/Eberron_Vault"
#  Leave it as "" only if this is a user/organization site (USERNAME.github.io).
# ---------------------------------------------------------------------------
baseurl: "/Eberron_Vault"
url: ""

# ---------------------------------------------------------------------------
#  Collections — each folder below becomes a section of the site.
#  To add content, drop a Markdown (.md) file into the matching _folder.
# ---------------------------------------------------------------------------
collections:
  lore:
    output: true
    permalink: /lore/:name/
  sessions:
    output: true
    permalink: /sessions/:name/
  npcs:
    output: true
    permalink: /npcs/:name/
  characters:
    output: true
    permalink: /characters/:name/
  events:
    output: true
    permalink: /events/:name/

# Default layout applied to each collection's entries so you don't have to
# specify it in every file.
defaults:
  - scope: { path: "", type: "lore" }
    values: { layout: entry }
  - scope: { path: "", type: "sessions" }
    values: { layout: entry }
  - scope: { path: "", type: "npcs" }
    values: { layout: entry }
  - scope: { path: "", type: "characters" }
    values: { layout: entry }
  - scope: { path: "", type: "events" }
    values: { layout: entry }

# Build settings
markdown: kramdown
permalink: pretty
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
